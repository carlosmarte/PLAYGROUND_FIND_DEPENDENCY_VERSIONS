name: npm-versions

# Two entry points:
#   * push / PR touching npm/**  -> run `make ci` (lint + smoke)
#   * manual "Run workflow"       -> run the version-check tool on a package
#     you type in, mirroring `main.mjs` CLI flags as inputs.
#
# Lives at the repo root because GitHub only discovers workflows under
# <repo-root>/.github/workflows/. Everything is scoped to the npm/ project
# via path filters and `working-directory`.

on:
  push:
    paths:
      - "npm/**"
      - ".github/workflows/npm-check.yml"
  pull_request:
    paths:
      - "npm/**"
      - ".github/workflows/npm-check.yml"
  workflow_dispatch:
    inputs:
      package:
        description: "Package to install-test (e.g. left-pad)"
        required: true
        type: string
      registry:
        description: "Registry URL (blank = npmjs.org / repo default)"
        required: false
        type: string
        default: ""
      limit:
        description: "Only probe the newest N versions (blank = all)"
        required: false
        type: string
        default: ""
      first_only:
        description: "Stop at the first version that installs"
        required: false
        type: boolean
        default: false
      verbose:
        description: "Stream full npm output (debug install failures)"
        required: false
        type: boolean
        default: false
      npm_version:
        description: "npm version to pin in the test env ('none' to skip)"
        required: false
        type: string
        default: "10.9.2"

defaults:
  run:
    working-directory: npm

jobs:
  # Automatic gate on every push / PR that touches the project.
  ci:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: make ci
        run: make ci

  # Manual run: install-test a package's versions from typed input.
  check:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Bootstrap environment
        run: make setup NPM_VERSION="${{ inputs.npm_version }}"

      - name: Run version check
        env:
          PACKAGE: ${{ inputs.package }}
          REGISTRY: ${{ inputs.registry }}
          LIMIT: ${{ inputs.limit }}
          FIRST_ONLY: ${{ inputs.first_only }}
          VERBOSE: ${{ inputs.verbose }}
          NPM_VERSION: ${{ inputs.npm_version }}
        run: |
          set -euo pipefail
          args=("$PACKAGE" --npm-version "$NPM_VERSION" --output installation_report.json)
          [ -n "$REGISTRY" ] && args+=(--registry "$REGISTRY")
          [ -n "$LIMIT" ]    && args+=(--limit "$LIMIT")
          [ "$FIRST_ONLY" = "true" ] && args+=(--first-only)
          [ "$VERBOSE" = "true" ] && args+=(--verbose)
          echo "Running: main.mjs ${args[*]}"
          node main.mjs "${args[@]}"

      - name: Summarize report
        if: always()
        run: |
          if [ -f installation_report.json ]; then
            cat installation_report.json
            {
              echo '### npm-versions report — `${{ inputs.package }}`'
              echo '```json'
              cat installation_report.json
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: installation-report
          path: npm/installation_report.json
          if-no-files-found: ignore
